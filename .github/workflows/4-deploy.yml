name: auth-engine-frontend · Register Production Deployment

# Manual only for now. To automate on push to main later, uncomment:
# on:
#   push:
#     branches:
#       - main
on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag, or SHA to record as deployed
        required: false
        default: main
        type: string

jobs:
  deployment:
    name: Register GitHub deployment for app.bestcrmhub.com
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "production",
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: "success",
              environment_url: "https://app.bestcrmhub.com",
              log_url: "https://app.bestcrmhub.com"
            });
