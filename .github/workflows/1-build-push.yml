# Runs after 0-ci succeeds on main (workflow_run). Pushes :latest to Docker Hub.
name: auth-engine-dashboard · Build and Push Docker Image

on:
  workflow_run:
    workflows: ["auth-engine-dashboard · Lint and Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref_type:
        description: Build source type
        required: true
        type: choice
        options:
          - branch
          - tag
        default: branch
      git_ref:
        description: Branch or tag name (e.g. main, v1.0.0)
        required: true
        type: string
        default: main
      docker_image:
        description: Docker image name (e.g. qniranjan01/authengine-dashboard). Leave blank to use DOCKERHUB_USERNAME/authengine-dashboard
        required: false
        type: string
        default: ""
      docker_tag:
        description: Docker image tag to push (e.g. 1.0.0, latest)
        required: true
        type: string

env:
  REGISTRY: docker.io

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve image name and tag
        id: image
        run: |
          if [ -n "${{ inputs.docker_image }}" ]; then
            IMAGE="${{ inputs.docker_image }}"
          else
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/authengine-dashboard"
          fi

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.docker_tag }}"
          else
            TAG="latest"
          fi

          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.git_ref || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ steps.image.outputs.full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL != '' && vars.NEXT_PUBLIC_API_URL || 'https://api.authengine.org/api/v1' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL != '' && vars.NEXT_PUBLIC_APP_URL || 'https://app.authengine.org' }}

      - name: Summary
        run: |
          echo "## Frontend Image Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "**Source:** \`${{ inputs.ref_type }}:${{ inputs.git_ref }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Source:** \`main@${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Image:** \`${{ steps.image.outputs.full }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.image.outputs.full }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
