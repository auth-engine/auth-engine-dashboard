name: auth-engine-frontend · Lint and Build

# Manual only for now. To automate later, uncomment:
# on:
#   pull_request:
#     branches: [main]
#   push:
#     branches: [main]
on:
  workflow_dispatch:

jobs:
  lint-and-build:
    name: Lint and production build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.bestcrmhub.com/api/v1
          NEXT_PUBLIC_APP_URL: https://app.bestcrmhub.com
