# Pipeline: merge to main → 0-ci → 1-build-push → 4-deploy (EC2)
name: auth-engine-dashboard · Lint and Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint and production build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.authengine.org/api/v1
          NEXT_PUBLIC_APP_URL: https://app.authengine.org
